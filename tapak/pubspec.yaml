name: tapak
description: Find pet-friendly places, together.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # UI
  flutter_rating_bar: ^4.0.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_dotenv: ^5.1.0
  url_launcher: ^6.2.5

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
